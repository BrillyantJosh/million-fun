services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
    container_name: million-fun-web
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=www.100million.fun,100million.fun
      - LETSENCRYPT_HOST=www.100million.fun,100million.fun
    networks:
      - webproxy

networks:
  webproxy:
    external: true
